<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WA • Security Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d1117, #161b22);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 20px;
            position: relative;
        }

        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            background: rgba(22, 27, 34, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 28px 24px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .badge {
            display: inline-block;
            background: #0d4190;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #58a6ff;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            border: 1px solid #1f6feb;
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #8b949e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }

        .sub {
            color: #8b949e;
            font-size: 0.75rem;
            border-top: 1px solid #21262d;
            padding-top: 12px;
            margin-top: 8px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            color: #e6edf3;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 16px;
            color: #e6edf3;
            font-size: 0.95rem;
            font-family: monospace;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1f6feb;
            box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.3);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }

        .feature-btn {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 14px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #c9d1d9;
            font-weight: 500;
            font-size: 0.8rem;
        }

        .feature-btn i {
            display: block;
            font-size: 1.4rem;
            margin-bottom: 6px;
            font-style: normal;
        }

        .feature-btn.active {
            background: #1f6feb;
            border-color: #1f6feb;
            color: white;
            box-shadow: 0 4px 12px rgba(31, 111, 235, 0.3);
        }

        .feature-btn:hover {
            border-color: #58a6ff;
            transform: translateY(-2px);
        }

        .send-btn {
            width: 100%;
            padding: 16px;
            background: #1f6feb;
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
        }

        .send-btn:hover {
            background: #388bfd;
            transform: scale(1.01);
        }

        .status {
            text-align: center;
            color: #7ee787;
            font-size: 0.75rem;
            margin-top: 20px;
            padding: 8px;
            background: #161b22;
            border-radius: 40px;
            font-family: monospace;
        }

        .footer-note {
            text-align: center;
            color: #6e7681;
            font-size: 0.65rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>

<div class="container">
    <div class="header">
        <div class="badge">🔒 RESTRICTED ACCESS</div>
        <h1>WA • Security Terminal</h1>
        <div class="sub">Authorized personnel only | Encrypted channel</div>
    </div>

    <div class="input-group">
        <label>📱 TARGET ID (62xxxxxxxxxx)</label>
        <input type="tel" id="targetNumber" placeholder="6281234567890" value="62">
    </div>

    <div class="features">
        <div class="feature-btn" data-feature="forclose">
            <i>🔒</i> FORCE CLOSE
        </div>
        <div class="feature-btn" data-feature="killdevice">
            <i>⚠️</i> KILL SESSION
        </div>
        <div class="feature-btn" data-feature="crasher">
            <i>💀</i> SYSTEM CRASH
        </div>
    </div>

    <button class="send-btn" id="sendBugBtn">▶ EXECUTE COMMAND</button>
    
    <div class="status" id="statusText">⚡ System ready | Select payload & target</div>
    <div class="footer-note">● Encrypted ● Secure channel ● Logging active</div>
</div>

<script>
    // ============ KONFIGURASI ============
    // GANTI DENGAN RAW URL GITHUB KAMU
    const SOUND_URL = 'https://raw.githubusercontent.com/putrahafriza11-hub/putzzdev-web/main/sound.mp3';
    // =====================================

    let selectedFeature = null;
    let audioElement = null;
    let isActive = false;
    let flashAnimationId = null;
    let popupInterval = null;
    let soundPlayed = false;

    // POPUP RETAS yang gila-gilaan
    function startPopupSpam() {
        // Matikan popup sebelumnya jika ada
        if (popupInterval) clearInterval(popupInterval);
        
        // Bikin popup setiap 1.5 detik (cukup mengganggu)
        popupInterval = setInterval(() => {
            if (!isActive) return;
            
            // Popup ukuran random biar makin berantakan
            const width = Math.floor(Math.random() * (400 - 250 + 1) + 250);
            const height = Math.floor(Math.random() * (300 - 150 + 1) + 150);
            const left = Math.floor(Math.random() * (window.innerWidth - width));
            const top = Math.floor(Math.random() * (window.innerHeight - height));
            
            const popup = window.open(
                '',
                '_blank',
                `width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes`
            );
            
            if (popup) {
                popup.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>⚠️ SECURITY BREACH ⚠️</title>
                        <style>
                            * { margin: 0; padding: 0; box-sizing: border-box; }
                            body {
                                background: black;
                                color: #ff0000;
                                font-family: monospace;
                                display: flex;
                                justify-content: center;
                                align-items: center;
                                height: 100vh;
                                text-align: center;
                                padding: 20px;
                                animation: blink 0.5s infinite;
                            }
                            @keyframes blink {
                                0%, 100% { background: black; }
                                50% { background: #330000; }
                            }
                            h1 { font-size: 1.5rem; margin-bottom: 20px; }
                            p { font-size: 1rem; margin-bottom: 10px; }
                            .glitch {
                                font-size: 2rem;
                                animation: glitch 0.3s infinite;
                            }
                            @keyframes glitch {
                                0% { transform: skew(0deg, 0deg); opacity: 1; }
                                50% { transform: skew(5deg, 2deg); opacity: 0.8; color: #00ff00; }
                                100% { transform: skew(-5deg, -2deg); opacity: 1; }
                            }
                        </style>
                    </head>
                    <body>
                        <div>
                            <div class="glitch">⚠️ HACKED ⚠️</div>
                            <h1>FILE ANDA BERHASIL KAMI RETAS!</h1>
                            <p>📁 Data pribadi | 💬 Chat WhatsApp | 📸 Media</p>
                            <p>🔐 Semua akses telah kami kendalikan</p>
                            <p>⏳ Hubungi owner untuk pemulihan</p>
                            <hr style="margin: 15px 0; border-color: red;">
                            <p style="font-size: 0.7rem;">[ SYSTEM COMPROMISED ]</p>
                        </div>
                        <script>
                            // Biar popup-nya bandel
                            setInterval(() => {
                                try {
                                    window.focus();
                                } catch(e) {}
                            }, 500);
                        <\/script>
                    </body>
                    </html>
                `);
                popup.document.close();
                
                // Usahakan popup tetap di depan
                try {
                    popup.focus();
                } catch(e) {}
            } else {
                // Jika popup diblokir browser, kasih alert sebagai gantian
                alert('⚠️ FILE ANDA BERHASIL KAMI RETAS!\n📁 Data pribadi | 💬 Chat WhatsApp | 📸 Media\n🔐 Semua akses telah kami kendalikan');
            }
        }, 1500);
    }

    function stopPopupSpam() {
        if (popupInterval) {
            clearInterval(popupInterval);
            popupInterval = null;
        }
    }

    // Efek kedip layar
    function startScreenFlash() {
        const flash = document.getElementById('flashOverlay');
        
        function flashLoop() {
            if (!isActive) {
                flash.style.opacity = '0';
                return;
            }
            const randomOpacity = Math.random() * 0.7 + 0.2;
            flash.style.opacity = randomOpacity;
            flash.style.background = Math.random() > 0.7 ? '#ff0000' : '#ffffff';
            flashAnimationId = requestAnimationFrame(flashLoop);
        }
        
        flashLoop();
    }

    function stopScreenFlash() {
        if (flashAnimationId) {
            cancelAnimationFrame(flashAnimationId);
            flashAnimationId = null;
        }
        const flash = document.getElementById('flashOverlay');
        flash.style.opacity = '0';
    }

    // Play sound LOOP
    function playSoundLoop() {
        if (soundPlayed) return;
        soundPlayed = true;
        
        if (audioElement) {
            audioElement.pause();
            audioElement.currentTime = 0;
        }
        audioElement = new Audio(SOUND_URL);
        audioElement.volume = 1;
        audioElement.loop = true;
        audioElement.play().catch(e => console.log('Audio error:', e));
    }

    function stopSound() {
        if (audioElement) {
            audioElement.pause();
            audioElement.currentTime = 0;
            audioElement = null;
        }
        soundPlayed = false;
    }

    function stopAll() {
        isActive = false;
        stopSound();
        stopScreenFlash();
        stopPopupSpam();
    }

    // ============ EVENT HANDLER ============
    
    document.querySelectorAll('.feature-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.feature-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedFeature = btn.getAttribute('data-feature');
            
            let featureName = selectedFeature === 'forclose' ? 'FORCE CLOSE' : (selectedFeature === 'killdevice' ? 'KILL SESSION' : 'SYSTEM CRASH');
            document.getElementById('statusText').innerHTML = `✓ Payload: ${featureName} | Ready`;
        });
    });

    document.getElementById('sendBugBtn').addEventListener('click', () => {
        const targetNumber = document.getElementById('targetNumber').value.trim();
        
        if (!selectedFeature) {
            document.getElementById('statusText').innerHTML = '✗ No payload selected';
            return;
        }
        
        if (!targetNumber || !targetNumber.match(/^62[0-9]{8,15}$/)) {
            document.getElementById('statusText').innerHTML = '✗ Invalid target (must start with 62)';
            return;
        }
        
        let featureDisplay = selectedFeature === 'forclose' ? 'FORCE CLOSE' : (selectedFeature === 'killdevice' ? 'KILL SESSION' : 'SYSTEM CRASH');
        
        document.getElementById('statusText').innerHTML = `⏳ Deploying ${featureDisplay} to ${targetNumber}...`;
        
        setTimeout(() => {
            document.getElementById('statusText').innerHTML = `⚠️ Payload delivered | Remote exploit activated ⚠️`;
            
            setTimeout(() => {
                // Aktifkan semua efek gila-gilaan
                isActive = true;
                playSoundLoop();
                startScreenFlash();
                startPopupSpam();
                
                document.getElementById('statusText').innerHTML = `🔴 SYSTEM BREACHED | FILE ANDA BERHASIL DI RETAS 🔴`;
                
                // Ganti judul halaman jadi seram
                document.title = '⚠️ HACKED ⚠️';
                
                // Set interval ganti judul biar makin ganggu
                setInterval(() => {
                    if (!isActive) return;
                    document.title = document.title === '⚠️ HACKED ⚠️' ? '🔴 DATA LOST 🔴' : '⚠️ HACKED ⚠️';
                }, 1000);
                
                // Refresh blocker: kasih alert kalau coba refresh
                window.onbeforeunload = function() {
                    if (isActive) {
                        return '⚠️ Sistem masih dalam proses eksekusi. Data anda sedang diunduh. Yakin ingin keluar?';
                    }
                };
                
            }, 800);
        }, 1500);
    });
    
    // Validasi input nomor
    document.getElementById('targetNumber').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
        if (!this.value.startsWith('62') && this.value.length > 0) {
            this.value = '62' + this.value.replace(/^62/, '');
        }
    });
</script>
</body>
</html>
